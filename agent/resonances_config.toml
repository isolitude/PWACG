# =============================================================================
# 数据映射和计算配置
# =============================================================================
[data_sources]
# 不同数据源的标识符
data = { phi = "data_phi_kk", f = "data_f_kk", phif0 = "data_phif0_kk", phif2 = "data_phif2_kk" }
mc = { phi = "mc_phi_kk", f = "mc_f_kk", phif0 = "mc_phif0_kk", phif2 = "mc_phif2_kk" }
truth = { phi = "truth_phi_kk", f = "truth_f_kk", phif0 = "truth_phif0_kk", phif2 = "truth_phif2_kk" }

# =============================================================================
# 振幅计算配置
# =============================================================================
[amplitude_calculations]
# 数据似然中的振幅计算
[[amplitude_calculations.data_likelihood]]
name = "data_phif0_kk_BW_flatte980"
resonance = "f980"
data_source = "data"

[[amplitude_calculations.data_likelihood]]
name = "data_phif0_kk_BW_BW"
resonance = "f0_1710"
data_source = "data"

[[amplitude_calculations.data_likelihood]]
name = "data_phif2_kk_BW_flatte1270"
resonance = "f1270"
data_source = "data"

[[amplitude_calculations.data_likelihood]]
name = "data_phif2_kk_BW_BW"
resonance = "f2_group"
data_source = "data"

# MC 似然中的振幅计算
[[amplitude_calculations.mc_likelihood]]
name = "mc_total_f980"
resonance = "f980"
data_source = "mc"

[[amplitude_calculations.mc_likelihood]]
name = "mc_total_f0"
resonance = "f0_1710"
data_source = "mc"

[[amplitude_calculations.mc_likelihood]]
name = "mc_total_f1270"
resonance = "f1270"
data_source = "mc"

[[amplitude_calculations.mc_likelihood]]
name = "mc_total_f2"
resonance = "f2_group"
data_source = "mc"

# 约束计算中的振幅
[[amplitude_calculations.constraint]]
name = "lasso_data_phif0_kk_BW_flatte980"
resonance = "f980"
data_source = "truth"

[[amplitude_calculations.constraint]]
name = "lasso_data_phif0_kk_BW_BW"
resonance = "f0_1710"
data_source = "truth"

[[amplitude_calculations.constraint]]
