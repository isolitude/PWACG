data_source = "truth"

[[amplitude_calculations.constraint]]
name = "lasso_data_phif2_kk_BW_BW"
resonance = "f2_group"
data_source = "truth"

# =============================================================================
# 代码生成器配置
# =============================================================================
[code_generator]
# LLM 代码生成相关配置
template_path = "templates/fit_template_hvp.py"
output_path = "agent/generated/fit_kk_generated.py"

# 参数映射：TOML 配置 -> 代码参数名
[code_generator.parameter_mapping]
# 将 TOML 中的参数名映射到代码中使用的参数名
f980_mass = "kk_f980_mass"
f980_g_kk = "kk_f980_g_kk"
f980_rg = "kk_f980_rg"
f980_const = "kk_f980_const"
f980_theta = "kk_f980_theta"

f0_mass = "kk_f0_mass"
f0_width = "kk_f0_width"
f0_const = "kk_f0_const"
f0_theta = "kk_f0_theta"

f1270_mass = "kk_f1270_mass"
f1270_width = "kk_f1270_width"
f1270_const = "kk_f1270_const"
f1270_theta = "kk_f1270_theta"

f2_mass = "kk_f2_mass"
f2_width = "kk_f2_width"
f2_const = "kk_f2_const"
f2_theta = "kk_f2_theta"

# LLM 提示模板
[code_generator.llm_prompts]
# 用于生成共振态计算函数的提示
resonance_calculation = """
基于以下共振态配置生成 JAX 计算函数:
- 共振态名称: {name}
- 传播子类型: {propagators}
- 物理参数: {parameters}
- 复数系数: {coefficients}

生成的函数应该:
1. 使用 JAX numpy 和 dplex 库
2. 计算 Breit-Wigner 或 Flatte 传播子
3. 正确处理复数系数
4. 返回振幅计算结果
"""

# 用于生成参数提取函数的提示
parameter_extraction = """
基于共振态配置生成参数提取代码:
- 参数列表: {parameters}
- 参数索引: {indices}
- 固定参数: {fixed_params}

生成的代码应该从 args 数组中正确提取所有参数。
"""