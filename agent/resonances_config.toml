# PWA 共振态配置文件
# 用于 LLM 代码生成器识别和生成共振态相关代码

[metadata]
version = "1.0"
channel = "kk"
description = "KK 通道共振态物理参数配置"
generator_target = "fit_hvp_templates.py"

# 通用固定参数（所有共振态共享）
[fixed_parameters]
phi_mass = 1.02
phi_width = 0.004

# 共振态定义
# 每个共振态包含：类型、传播子函数、参数、约束等信息

# =============================================================================
# f980 共振态 (Flatte 形状)
# =============================================================================
[resonances.f980]
name = "f980"
type = "flatte"
mod_name = "phif0_980_kk"  # 模式标识符
amplitude_wave = "phif0_kk"  # 使用的振幅波函数

# 传播子配置
[resonances.f980.propagators]
phi_propagator = "BW"  # Breit-Wigner
f_propagator = "flatte980"  # Flatte 形状

# 物理参数
[resonances.f980.parameters]
mass = { value = 0.9794812115574156, range = [0.98, 10.0], fixed = false, error = 0.0029114167854559173 }
g_kk = { value = 0.10678616326827592, fixed = false, error = 0.010260657247901088 }
rg = { value = 8.570187550432664, fixed = false, error = 1.348489540060868 }

# 复数系数（实部和虚部）
[resonances.f980.coefficients]
# 第一组系数（固定）
const1 = { value = 0.1, fixed = true, error = 0.0 }
theta1 = { value = 0.1, fixed = true, error = 0.0 }
# 第二组系数（浮动）
const2 = { value = 0.1065182971468388, fixed = false, error = 0.003833456119689838 }
theta2 = { value = 0.03807025376236671, fixed = false, error = 0.0032382807585900437 }

# 代码生成提示
[resonances.f980.code_generation]
function_template = "calculate_BW_flatte980"
lasso_function_template = "lasso_calculate_BW_flatte980"
parameter_extraction = ["kk_f980_mass", "kk_f980_g_kk", "kk_f980_rg", "kk_f980_const", "kk_f980_theta"]

# =============================================================================
# f0_1710 共振态 (Breit-Wigner 形状)
# =============================================================================
[resonances.f0_1710]
name = "f0_1710"
type = "BW"
mod_name = "phif0_1710_kk"
amplitude_wave = "phif0_kk"

[resonances.f0_1710.propagators]
phi_propagator = "BW"
f_propagator = "BW"

[resonances.f0_1710.parameters]
mass = { value = 1.6761965590304995, range = [1.704, 1.0], fixed = false, error = 0.008608254171218993 }
width = { value = 0.16270071108440043, range = [0.123, 1.0], fixed = false, error = 0.007928828044131218 }

[resonances.f0_1710.coefficients]
const1 = { value = 0.02201375198386279, fixed = false, error = 0.0028493281809777366 }
const2 = { value = 0.007433204877151768, fixed = false, error = 0.0027873338673183225 }
theta1 = { value = 0.008302300118288414, fixed = false, error = 0.003420832265462995 }
theta2 = { value = -0.018544178045626723, fixed = false, error = 0.002285070372617045 }

[resonances.f0_1710.code_generation]
