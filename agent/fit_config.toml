[parameter_bounds]
# 参数边界约束（可选）
enabled = true

[parameter_bounds.mass]
# 质量参数的边界
f980_mass = [0.8, 1.2]
f0_mass = [1.5, 2.0]  
f1270_mass = [1.0, 1.5]
f2_mass = [1.0, 3.0]

[parameter_bounds.width]
# 宽度参数的边界
min_width = 0.001
max_width = 1.0

[parameter_bounds.coupling]
# 耦合常数边界
min_coupling = -1.0
max_coupling = 1.0

[debug]
# 调试选项
verbose = true
save_intermediate_results = false
plot_likelihood_surface = false
parameter_correlation_analysis = false

# 导入配置（用于生成器确定需要导入的函数）
[imports]
common_modules = [
    "setup_logging", "load_data", "normalize_data", "prepare_data_for_jax"
]
resonance_functions = [
    "calculate_BW_flatte980", "calculate_BW_BW", "calculate_BW_flatte1270",
    "lasso_calculate_BW_flatte980", "lasso_calculate_BW_BW", "lasso_calculate_BW_flatte1270"
]
additional_imports = []