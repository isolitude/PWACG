    "phi_mass", "phi_width", "f980_mass", "f980_g_kk", "f980_rg",
    "f980_const1", "f980_const2", "f980_theta1", "f980_theta2", 
    "f0_mass", "f0_width", "f0_const1", "f0_const2", "f0_theta1", "f0_theta2",
