# PWA拟合配置文件
# 支持代码生成器生成拟合脚本

[general]
# 基本设置
experiment_name = "kk_channel_fit"
description = "KK 通道 PWA 拟合"
output_dir = "output/fit"
log_level = "INFO"
template_version = "hvp"

[code_generation]
# 代码生成相关配置
template_file = "agent/templates/fit_template_hvp.py"
output_file = "agent/generated/fit_kk_generated.py"
common_module_path = "agent.common.pwa_common"

# 生成选项
[code_generation.options]
preserve_comments = true
add_generation_timestamp = true
add_config_reference = true
output_format = "python"
include_type_hints = false

[data]
# 数据文件路径
data_dir = "data"

[data.real_data]
phif0 = "data/real_data/phif0_kk.npy"
phif2 = "data/real_data/phif2_kk.npy"
phi = "data/real_data/phi_kk.npy"
f = "data/real_data/f_kk.npy"

[data.mc_data]
phif0 = "data/mc_truth/phif0_kk.npy"
phif2 = "data/mc_truth/phif2_kk.npy"
phi = "data/mc_truth/phi_kk.npy"
f = "data/mc_truth/f_kk.npy"

[data.weight]
enabled = true
file = "data/weight/weight_kk.npy"
fallback_to_unity = true  # 如果权重文件不存在，使用单位权重

[data.normalization]
enabled = true
mc_sample_size = 150000  # MC truth 数据截取大小

[physics]
# 物理参数设置

[physics.fixed_parameters]
# 固定参数（不参与拟合）
phi_mass = 1.02
phi_width = 0.004

[physics.resonances]
# 共振态配置

[physics.resonances.f980]
name = "f980"
type = "flatte"
initial_mass = 0.9794812115574156
initial_g_kk = 0.10678616326827592
initial_rg = 8.570187550432664
const_fixed = 0.1  # 第一个常数固定
theta_fixed = 0.1  # 第一个相位固定

[physics.resonances.f0_1710]
name = "f0_1710"
type = "BW"
initial_mass = 1.6761965590304995
initial_width = 0.16270071108440043

[physics.resonances.f1270]
name = "f1270"
type = "flatte1270"
initial_mass = 1.2896149318644679
initial_width = 0.1959796900380022
n_components = 5  # 多重态数量

[physics.resonances.f2_1525]
name = "f2_1525"
type = "BW"
initial_mass = 1.5222602842746435
initial_width = 0.08576525399315078

[physics.resonances.f2_2150]
name = "f2_2150"
type = "BW"
initial_mass = 2.1619576785269476
initial_width = 0.15906049251159413

[physics.resonances.f2_2340]
name = "f2_2340"
type = "BW"
initial_mass = 2.547889297662712
initial_width = 0.324001266488012

[physics.resonances.f2_group]
name = "f2"
type = "BW_multi"
args_start = 23
n_components = 5
n_masses = 3
initial_masses = [1.5222602842746435, 2.1619576785269476, 2.547889297662712]
initial_widths = [0.08576525399315078, 0.15906049251159413, 0.324001266488012]
wave_type = "phif2_kk"

# 振幅计算配置（用于生成DATA_LIKELIHOOD_CALCULATION块）
[physics.amplitudes]

[[physics.amplitudes.data_likelihood]]
name = "data_phif0_kk_BW_flatte980"
function = "calculate_BW_flatte980"
resonance1 = "phi"
resonance2 = "f980"
data_source = "data"
wave = "phif0_kk"

[[physics.amplitudes.data_likelihood]]
name = "data_phif0_kk_BW_BW"
function = "calculate_BW_BW"
resonance1 = "phi"
resonance2 = "f0_1710"
data_source = "data"
wave = "phif0_kk"

[[physics.amplitudes.data_likelihood]]
name = "data_phif2_kk_BW_flatte1270"
function = "calculate_BW_flatte1270"
resonance1 = "phi"
resonance2 = "f1270"
data_source = "data"
wave = "phif2_kk"

[[physics.amplitudes.data_likelihood]]
name = "data_phif2_kk_BW_BW"
function = "calculate_BW_BW"
resonance1 = "phi"
resonance2 = "f2_group"
data_source = "data"
wave = "phif2_kk"

[[physics.amplitudes.mc_likelihood]]
name = "mc_total_f980"
function = "calculate_BW_flatte980"
resonance1 = "phi"
resonance2 = "f980"
data_source = "mc"
wave = "phif0_kk"

[[physics.amplitudes.mc_likelihood]]
name = "mc_total_f0"
function = "calculate_BW_BW"  
resonance1 = "phi"
resonance2 = "f0_1710"
data_source = "mc"
wave = "phif0_kk"

[[physics.amplitudes.mc_likelihood]]
name = "mc_total_f1270"
function = "calculate_BW_flatte1270"
resonance1 = "phi"
resonance2 = "f1270"
data_source = "mc"
wave = "phif2_kk"

[[physics.amplitudes.mc_likelihood]]
name = "mc_total_f2"
function = "calculate_BW_BW"
resonance1 = "phi"
resonance2 = "f2_group"
data_source = "mc"
wave = "phif2_kk"

# 约束计算配置（用于生成CONSTRAINT_CALCULATION块）
[physics.constraints]
enabled = true
type = "lasso_constraint"
target_value = 1.03
penalty_factor = 10000.0
default_strength = 0.0

[[physics.constraints.amplitudes]]
name = "lasso_data_phif0_kk_BW_flatte980"
function = "lasso_calculate_BW_flatte980"
resonance1 = "phi"
resonance2 = "f980"
data_source = "truth"
wave = "phif0_kk"

[[physics.constraints.amplitudes]]
name = "lasso_data_phif0_kk_BW_BW"
function = "lasso_calculate_BW_BW"
resonance1 = "phi"
resonance2 = "f0_1710"
data_source = "truth"
wave = "phif0_kk"

[[physics.constraints.amplitudes]]
name = "lasso_data_phif2_kk_BW_flatte1270"
function = "lasso_calculate_BW_flatte1270"
resonance1 = "phi"
resonance2 = "f1270"
data_source = "truth"
wave = "phif2_kk"

[[physics.constraints.amplitudes]]
name = "lasso_data_phif2_kk_BW_BW"
function = "lasso_calculate_BW_BW"
resonance1 = "phi"
resonance2 = "f2_group"
data_source = "truth"
wave = "phif2_kk"

# 数据成员配置（用于生成DATA_INITIALIZATION块）
[data.initialization]
data_types = ["data", "mc", "truth"]
channels = ["phi_kk", "f_kk", "phif0_kk", "phif2_kk"]
additional = ["wt_data_kk"]

[fitting]
# 拟合算法设置

[fitting.optimization]
method = "Newton-CG"  # HVP版本使用Newton-CG
max_iterations = 1000
gradient_tolerance = 1e-6
function_tolerance = 1e-8
xtol = 1e-8
display_progress = false
use_hvp = true  # 启用HVP

[fitting.callbacks]
enabled = true
log_frequency = 10  # 每10次迭代输出一次

[fitting.constraints]
# 拟合约束
total_fraction = 1.03
lambda_constraint = 0.0  # 约束强度系数
boundary_penalty = 10000.0  # 边界惩罚系数

[jax_config]
# JAX配置
enable_x64 = true
jit_compilation = true
device = "auto"  # 可选: "cpu", "gpu", "auto"

[logging]
# 日志配置
config_file = "config/logconfig_fit.json"
backup_logging = true
log_file = "output/fit/fit_sample.log"

[output]
# 输出配置
save_json = true
save_npz = false
json_filename = "simple_fit_result.json"
include_diagnostics = true

[output.json_fields]
# JSON输出包含的字段
success = true
final_likelihood = true
iterations = true
function_evaluations = true
gradient_evaluations = true
optimization_time = true
parameters = true
optimized_parameters = true
float_indices = true

# 初始参数向量（完整的63个参数）
